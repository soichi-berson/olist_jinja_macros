version: 2

models:
  - name: fct_orders
    description: "Orders fact table with payments and items"
    columns:
      - name: order_id
        description: "Unique order identifier"
        tests:
          - unique
          - not_null

  - name: dim_customers
    description: "Customer dimension with order stats"
    columns:
      - name: customer_id
        description: "Unique customer identifier"
        tests:
          - unique
          - not_null

  - name: dim_sellers
    description: "Seller dimension with review stats"
    columns:
      - name: seller_id
        description: "Unique seller identifier"
        tests:
          - unique
          - not_null

  - name: dim_products
    description: "Products dimension with English translations"
    columns:
      - name: product_id
        description: "Unique product identifier"
        tests:
          - unique
          - not_null